name: Create Debian Package

on: [push, pull_request]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: RelWithDebInfo
  # docker/build-push-action uploads a .dockerbuild build-record artifact per
  # run by default. They're only consumed by the buildx history debug UI and
  # piled up (hundreds) against the Actions storage quota. Disable the upload.
  DOCKER_BUILD_RECORD_UPLOAD: false

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # docker/build-push-action + GHA cache. Combined with the split-stage
      # Dockerfile (deps in a stable layer that only invalidates on
      # CMakeLists.txt / cmake/ / lib/ / externals/ / build_oatpp.sh
      # changes), typical source-change PRs reuse cached layers and rebuild
      # in ~2 min instead of ~15. Scope is per-OS so amd64 + arm64 matrix
      # don't trample each other. See issue #13.
      - name: Build in container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{github.workspace}}/Dockerfile
          target: package
          tags: temp-image
          load: true
          cache-from: type=gha,scope=package-${{ matrix.os }}
          cache-to: type=gha,mode=max,scope=package-${{ matrix.os }}

      - name: Build temp container
        run: docker create --name temp-container temp-image

      - name: Copy Package
        run: mkdir ${{github.workspace}}/package/ && docker cp temp-container:/package/ ${{github.workspace}}/

      - name: Save artifact
        uses: actions/upload-artifact@v7
        with:
          name: creature-server-package-${{ matrix.os }}
          path: ${{github.workspace}}/package/
          # 7-day retention so build artifacts don't pile up against the
          # account-level Actions storage quota. Long enough to grab a
          # package off a recent commit; older commits should be rebuilt.
          retention-days: 7
